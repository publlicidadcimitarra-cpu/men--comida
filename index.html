<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menú</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
overflow:hidden;
}

/* MENU FIJO */

.menu{
position:fixed;
top:0;
width:100%;
background:black;
display:flex;
justify-content:center;
gap:10px;
padding:10px;
z-index:1000;
}

.menu a{
background:#FFD400;
color:black;
text-decoration:none;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
}

/* CONTENEDOR DE PAGINAS */

.slider{
display:flex;
height:100vh;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

/* CADA PAGINA */

.pagina{
flex:0 0 100%;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
}

/* IMAGENES */

.pagina img{
max-width:100%;
max-height:80vh;
}

/* LOGO CENTRADO */

.logo{
width:200px;
}

</style>

</head>

<body>


<!-- MENU CON ICONOS -->

<div class="menu">
