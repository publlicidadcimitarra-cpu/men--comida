<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menú</title>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
overflow-x:hidden;
}
.portada{
text-align:center;
color:white;
}

.bienvenida{
font-size:28px;
margin-top:10px;
letter-spacing:2px;
}

/* MENU */

.menu{
position:fixed;
top:0;
width:100%;
background:#000;
display:flex;
overflow-x:auto;
padding:10px;
gap:8px;
z-index:1000;
}

.menu a{
background:#FFD400;
color:#000;
text-decoration:none;
padding:10px 14px;
border-radius:8px;
font-size:14px;
font-weight:bold;
white-space:nowrap;
}

/* SLIDER */

.slider{

margin-top:70px;
display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;

}

.pagina{

flex:0 0 100%;
scroll-snap-align:start;

}

.pagina img{

width:100%;
height:auto;
display:block;

}
/* PORTADA */

.portada{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
color:white;
}


</style>

</head>
