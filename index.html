<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menú</title>

<style>

body{
margin:0;
font-family:Arial;
background:black;
overflow:hidden; /* bloquea scroll vertical */
}

/* MENU FLOTANTE */

.menu{
position:fixed;
top:15px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
backdrop-filter:blur(5px);
display:flex;
gap:10px;
padding:10px 15px;
border-radius:20px;
z-index:999;
}

.menu a{
background:#FFD400;
color:black;
text-decoration:none;
padding:8px 14px;
border-radius:8px;
font-weight:bold;
font-size:14px;
}

/* CONTENEDOR */

.slider{
display:flex;
height:100vh;
overflow-x:auto;
overflow-y:hidden;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
}

/* PAGINAS */

.pagina{
flex:0 0 100%;
height:100vh;
scroll-snap-align:start;
display:flex;
justify-content:center;
align-items:center;
}

/* IMAGENES */

.pagina img{
max-width:100%;
max-height:85vh;
object-fit:contain;
}

/* LOGO */

.logo{
width:220px;
}

</style>

</head>

<body>


<!-- MENU -->

<div class="menu">

<a href="#p1">Micheladas</a>
<a href="#p4">Granizados</a>
<a href="#p12">Antojos</a>
<a href="#p15">Comidas</a>
<a href="#p18">Hamburguesas</a>
<a href="#p26">Picadas</a>

</div>


<!-- SLIDER -->

<div class="slider">

<div class="pagina">
<img src="logo.png" class="logo">
</div>
